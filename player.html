<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecteur - AKH TV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0c; --card: #111114; --accent: #00ff88; --text: #ffffff; }
        body { 
            font-family: 'Poppins', sans-serif; background-color: var(--bg); color: var(--text); 
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        
        .player-header {
            width: 100%; padding: 15px 20px; background: rgba(0,0,0,0.8);
            border-bottom: 1px solid rgba(255,255,255,0.05); display: flex;
            justify-content: space-between; align-items: center; box-sizing: border-box;
        }
        .match-title { font-size: 1rem; font-weight: 800; margin: 0; color: var(--accent); }
        .back-btn { color: white; text-decoration: none; font-size: 0.8rem; font-weight: 600; background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 6px; }

        .video-container {
            width: 100%; max-width: 1000px; aspect-ratio: 16/9; background: #000;
            margin-top: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05); position: relative;
        }
        
        video { width: 100%; height: 100%; outline: none; display: none; }
        iframe { width: 100%; height: 100%; border: none; display: none; }

        .sources-container {
            width: 100%; max-width: 1000px; padding: 15px; display: flex;
            gap: 10px; flex-wrap: wrap; justify-content: center; box-sizing: border-box; margin-bottom: 30px;
        }
        .source-btn {
            background: var(--card); color: #fff; border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 20px; border-radius: 8px; cursor: pointer; font-family: 'Poppins';
            font-weight: 600; font-size: 0.85rem; transition: 0.2s; display: flex; align-items: center; gap: 8px;
        }
        .source-btn:hover { background: rgba(255,255,255,0.05); }
        .source-btn.active { background: rgba(0, 255, 136, 0.1); border-color: var(--accent); color: var(--accent); }
    </style>
</head>
<body>

    <div class="player-header">
        <h1 class="match-title" id="match-title">Chargement...</h1>
        <a href="#" onclick="window.close()" class="back-btn">Fermer</a>
    </div>

    <div class="video-container" id="video-wrapper">
        <video id="video-player" controls autoplay playsinline></video>
        <iframe id="iframe-player" sandbox="allow-scripts allow-same-origin" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    </div>

    <div class="sources-container" id="sources-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCznQgA4zvs1dhZQzqtPqjfabsbBhEmvhU", 
            authDomain: "akhh-3b20d.firebaseapp.com", 
            projectId: "akhh-3b20d", 
            storageBucket: "akhh-3b20d.firebasestorage.app", 
            messagingSenderId: "702428098406", 
            appId: "1:702428098406:web:6f164b6674c3fe6019e2a7" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const matchId = urlParams.get('id');

        const video = document.getElementById('video-player');
        const iframe = document.getElementById('iframe-player');
        const sourcesContainer = document.getElementById('sources-container');
        const titleEl = document.getElementById('match-title');
        let hlsInstance = null;

        async function initPlayer() {
            if (!matchId) { titleEl.innerText = "Erreur : Aucun match sélectionné."; return; }

            try {
                const docSnap = await getDoc(doc(db, "streams", matchId));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    titleEl.innerText = data.nom;

                    let sources = data.sources || [];
                    if (sources.length === 0 && data.url) {
                        sources = [{ nom: "Serveur Principal", url: data.url }];
                    }

                    if (sources.length > 0) {
                        buildSourceButtons(sources);
                        playSource(sources[0], 0); 
                    } else {
                        titleEl.innerText = "Aucun flux disponible pour ce match.";
                    }
                } else {
                    titleEl.innerText = "Match introuvable ou terminé.";
                }
            } catch (error) {
                console.error("Erreur Firebase:", error);
                titleEl.innerText = "Erreur de connexion serveur.";
            }
        }

        function buildSourceButtons(sources) {
            sourcesContainer.innerHTML = '';
            sources.forEach((src, index) => {
                const btn = document.createElement('button');
                btn.className = 'source-btn';
                btn.innerHTML = `▶ ${src.nom}`;
                
                btn.onclick = () => {
                    document.querySelectorAll('.source-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    playSource(src, index);
                };

                if (index === 0) btn.classList.add('active');
                sourcesContainer.appendChild(btn);
            });
        }

        function playSource(sourceData, index) {
            const url = sourceData.url;
            const nomSource = sourceData.nom.toLowerCase(); 

            if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
            video.pause();
            video.src = '';
            iframe.src = '';

            const matchName = document.getElementById('match-title').getAttribute('data-original-title') || document.getElementById('match-title').innerText;
            document.getElementById('match-title').innerText = matchName;
            document.getElementById('match-title').setAttribute('data-original-title', matchName);

            // 🛑 L'astuce est bien ici : "Lien Externe" dans le nom du bouton
            const isAntiIframe = nomSource.includes('lien externe');

            if (url.includes('.m3u8')) {
                iframe.style.display = 'none';
                video.style.display = 'block';

                if (Hls.isSupported()) {
                    hlsInstance = new Hls();
                    hlsInstance.loadSource(url);
                    hlsInstance.attachMedia(video);
                    hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => video.play());
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = url;
                    video.addEventListener('loadedmetadata', () => video.play());
                }
            } 
            else if (isAntiIframe) {
                video.style.display = 'none';
                iframe.style.display = 'none';
                document.getElementById('match-title').innerText = "Lecture dans un nouvel onglet ↗️";
                window.open(url, '_blank');
            }
            else {
                video.style.display = 'none';
                iframe.style.display = 'block';
                iframe.src = url; 
            }
        }

        initPlayer();
    </script>
</body>
</html>
