<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKH TV - Streaming Sportif</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root { --bg: #0a0a0c; --card: #111114; --accent: #00ff88; --text: #ffffff; --gold: #ffd700; --blue: #4488ee; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding-bottom: 40px; display: flex; flex-direction: column; min-height: 100vh; }

        header { padding: 15px; text-align: center; background: rgba(0,0,0,0.9); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: center; align-items: center; }
        header h1 { margin: 0; font-size: 0.9rem; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; }
        
        .global-counter { position: absolute; right: 15px; font-size: 0.65rem; color: #ff4444; font-weight: 800; background: rgba(255, 68, 68, 0.15); padding: 4px 8px; border-radius: 6px; border: 1px solid rgba(255, 68, 68, 0.25); display: flex; align-items: center; gap: 4px; }

        #interstitial { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; display: none; justify-content: center; align-items: center; }
        .interstitial-card { background: #111; padding: 40px 20px; border-radius: 24px; border: 1px solid var(--accent); text-align: center; width: 85%; max-width: 350px; position: relative; }
        .close-x { position: absolute; top: 15px; right: 20px; color: #444; font-size: 24px; cursor: pointer; font-weight: bold; }

        .social-bar { display: flex; justify-content: center; gap: 8px; margin: 20px auto; flex-wrap: wrap; padding: 0 15px; }
        .social-btn { padding: 6px 12px; border-radius: 50px; text-decoration: none; color: white; font-weight: 800; font-size: 0.6rem; text-align: center; text-transform: uppercase; }

        .bg-blue { background: #4488ee; }
        .bg-iptv { background: var(--gold); color: #000; }

        .main-content { padding: 0 15px; max-width: 800px; margin: auto; width: 100%; box-sizing: border-box; flex: 1; }
        #no-match { text-align: center; padding: 100px 20px; color: #444; font-size: 0.85rem; width: 100%; }

        .sport-title { font-size: 0.75rem; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin: 30px 0 15px 0; display: flex; align-items: center; gap: 10px; }
        .sport-title::after { content: ""; flex: 1; height: 1px; background: rgba(0, 255, 136, 0.1); }
        .comp-title { font-size: 0.9rem; font-weight: 600; margin-bottom: 12px; color: #eee; }

        .grid { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }
        .card { display: flex; align-items: center; background: var(--card); border-radius: 12px; padding: 12px; border: 1px solid rgba(255,255,255,0.03); position: relative; transition: 0.2s; }
        .card-img { width: 85px; height: 60px; border-radius: 8px; object-fit: cover; margin-right: 15px; }
        .card-info { flex: 1; padding-right: 45px; }
        
        .card-header-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; min-height: 18px; }
        .match-name { font-size: 0.85rem; font-weight: 700; margin: 0 0 6px 0; line-height: 1.2; }
        
        .btn-regarder { background: var(--accent); color: #000; border: none; padding: 8px 20px; border-radius: 6px; font-weight: 800; font-size: 0.7rem; cursor: pointer; text-transform: uppercase; }
        .btn-attente { background: #2a2a2f; color: #777; border: none; padding: 8px 20px; border-radius: 6px; font-weight: 800; font-size: 0.7rem; cursor: not-allowed; text-transform: uppercase; }
        
        .live-dot { font-size: 0.55rem; color: #ff4444; font-weight: 800; display: flex; align-items: center; gap: 4px; }
                        /* Style de base pour Mobile (Petit et simple, comme avant) */
        .waiting-dot { font-size: 0.55rem; color: #ffcc00; font-weight: 800; display: flex; align-items: center; gap: 4px; }

        /* Style pour PC et Tablettes (Style badge, mais un peu réduit) */
        @media (min-width: 768px) {
            .waiting-dot { font-size: 0.75rem; gap: 6px; letter-spacing: 1px; background: rgba(255, 204, 0, 0.1); padding: 4px 8px; border-radius: 6px; border: 1px solid rgba(255, 204, 0, 0.2); }
        }


        .dot { width: 5px; height: 5px; background: #ff4444; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .viewers-badge { position: absolute; top: 12px; right: 12px; display: inline-flex; align-items: center; gap: 4px; background: rgba(255, 68, 68, 0.1); color: #ff4444; padding: 3px 8px; border-radius: 6px; font-size: 0.65rem; font-weight: 800; border: 1px solid rgba(255, 68, 68, 0.2); }
        .viewers-badge svg { width: 12px; height: 12px; fill: currentColor; }

        footer { padding: 40px 15px; text-align: center; border-top: 1px solid rgba(255,255,255,0.03); margin-top: 50px; }
        .footer-links a { color: #555; text-decoration: none; font-size: 0.65rem; margin: 0 10px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="interstitial">
        <div class="interstitial-card">
            <span class="close-x" onclick="closeInterstitial()">×</span>
            <h2 id="int-title" style="margin-top:0">AKH TV</h2>
            <p id="int-text" style="color:#888; font-size:0.85rem">Chargement...</p>
            <a href="#" id="int-link" target="_blank" style="display:block; padding:15px; border-radius:12px; text-decoration:none; font-weight:800; color:#000; background:var(--accent); margin-top:20px;">REJOINDRE</a>
        </div>
    </div>

    <header>
        <h1>AKH TV</h1>
        <div class="global-counter">👁️ <span id="global-count">0</span></div>
    </header>

    <div class="social-bar">
        <a href="https://discord.com/invite/9hDDERzTJe" target="_blank" class="social-btn bg-blue">DISCORD</a>
        <a href="https://t.me/+5HpqbYj2l4kzMDQ8" target="_blank" class="social-btn bg-blue">TELEGRAM</a>
        <a href="https://discord.gg/CGG5m2ddj2" target="_blank" class="social-btn bg-iptv">💎 IPTV 10€</a>
    </div>

    <div class="main-content" id="streams-container">
        <div id="no-match">⚽ Analyse des matchs en cours...</div>
    </div>

    <footer>
        <div class="footer-links">
            <a href="dmca.html">DMCA</a>
            <a href="mentions.html">MENTIONS LÉGALES</a>
            <a href="https://discord.com/invite/9hDDERzTJe" target="_blank">CONTACT</a>
        </div>
        <p class="copyright" style="font-size: 0.7rem; color: #444; margin-top: 15px;">AKH TV &copy; 2026</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCznQgA4zvs1dhZQzqtPqjfabsbBhEmvhU", 
            authDomain: "akhh-3b20d.firebaseapp.com", 
            databaseURL: "https://akhh-3b20d-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "akhh-3b20d", 
            storageBucket: "akhh-3b20d.firebasestorage.app", 
            messagingSenderId: "702428098406", 
            appId: "1:702428098406:web:6f164b6674c3fe6019e2a7" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const rtdb = getDatabase(app);

        onValue(ref(rtdb, 'viewers'), (snapshot) => {
            let total = 0;
            if (snapshot.exists()) {
                const data = snapshot.val();
                for (const matchId in data) {
                    total += Object.keys(data[matchId]).length;
                }
            }
            const globalCounter = document.getElementById('global-count');
            if(globalCounter) globalCounter.innerText = total;
        });

        const configs = [
            { title: "💎 ACCÈS VIP PREMIUM", text: "L'expérience IPTV ultime : Zéro pub, 4K fluide et stabilité garantie pour seulement 10€ !", link: "https://discord.gg/CGG5m2ddj2", btnText: "PROFITER DE L'OFFRE 🔥", color: "#ffd700" },
            { title: "🛡️ GARDE LE CONTACT", text: "Ne risque pas de perdre l'accès ! Rejoins notre serveur de secours pour rester informé en cas de maintenance.", link: "https://discord.gg/xM7CJsvKgd", btnText: "REJOINDRE LE BACKUP 🚨", color: "#ff4500" }
        ];

        if (!sessionStorage.getItem('popupSeen')) {
            const selected = configs[Math.floor(Math.random() * configs.length)];
            document.getElementById('int-title').innerText = selected.title;
            document.getElementById('int-text').innerText = selected.text;
            const iLink = document.getElementById('int-link');
            iLink.href = selected.link; iLink.innerText = selected.btnText; iLink.style.background = selected.color;
            document.getElementById('interstitial').style.display = 'flex';
        }

        window.closeInterstitial = function() { 
            document.getElementById('interstitial').style.display = 'none'; 
            sessionStorage.setItem('popupSeen', 'true');
        };

        onSnapshot(query(collection(db, "streams"), orderBy("priorite", "asc")), (snap) => {
            const cont = document.getElementById('streams-container');
            if (snap.empty) {
                cont.innerHTML = '<div id="no-match">⚽ Aucun match programmé pour le moment.</div>';
                return;
            }

            let finalHTML = '';
            const groups = {};
            let liveMatchIds = []; 

            snap.forEach(d => {
                const data = d.data();
                const s = data.sport || "Autres";
                const c = data.competition || "Direct";
                if(!groups[s]) groups[s] = {};
                if(!groups[s][c]) groups[s][c] = [];
                groups[s][c].push({id: d.id, ...data});
            });

            for(const s in groups) {
                finalHTML += `<div class="sport-title">${s}</div>`;
                for(const c in groups[s]) {
                    finalHTML += `<div class="comp-title">${c}</div>`;
                    finalHTML += `<div class="grid">`;
                    
                    groups[s][c].forEach(m => {
                        let statusHtml = '';
                        let buttonHtml = '';
                        let badgeHtml = '';
                        
                        // NOUVELLE LOGIQUE : VÉRIFICATION DU TEMPS
                        let isLive = m.visible !== false; // Base par défaut
                        let isCountdown = false;
                        
                        if (m.heureDebut) {
                            const matchTime = new Date(m.heureDebut).getTime();
                            const now = new Date().getTime();
                            if (matchTime > now) {
                                isLive = false;
                                isCountdown = true;
                            } else {
                                isLive = true; // Si l'heure est passée, on force le mode LIVE
                            }
                        }

                        if (isLive) {
                            liveMatchIds.push(m.id);
                            statusHtml = `<div class="live-dot" id="status-${m.id}"><div class="dot"></div> LIVE</div>`;
                            badgeHtml = `
                                <div class="viewers-badge" id="badge-${m.id}">
                                    <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                                    <span id="count-${m.id}">0</span>
                                </div>`;
                            buttonHtml = `<button id="btn-${m.id}" onclick="window.location.href='player.html?id=${m.id}'" class="btn-regarder">REGARDER</button>`;
                        } else {
                            if (isCountdown) {
                                statusHtml = `<div class="waiting-dot match-timer" id="status-${m.id}" data-time="${m.heureDebut}" data-id="${m.id}" data-live="false">⏳ CALCUL...</div>`;
                            } else {
                                statusHtml = `<div class="waiting-dot" id="status-${m.id}">⏳ BIENTÔT</div>`;
                            }
                            badgeHtml = `<div class="viewers-badge" id="badge-${m.id}" style="display:none;"></div>`; // Invisible en attente
                            buttonHtml = `<button id="btn-${m.id}" class="btn-attente" disabled>EN ATTENTE</button>`;
                        }

                        finalHTML += `
                        <div class="card" id="card-${m.id}" style="position:relative; ${isLive ? '' : 'opacity: 0.8;'}">
                            <img src="${m.image}" class="card-img" onerror="this.src='https://via.placeholder.com/85x60/111/444?text=AKH'">
                            <div class="card-info">
                                <div class="card-header-row">
                                    ${statusHtml}
                                </div>
                                <h3 class="match-name">${m.nom}</h3>
                                ${buttonHtml}
                            </div>
                            ${badgeHtml}
                        </div>`;
                    });
                    
                    finalHTML += `</div>`;
                }
            }
            
            cont.innerHTML = finalHTML;

            // Connexion du compteur pour les matchs en direct
            liveMatchIds.forEach(id => {
                onValue(ref(rtdb, 'viewers/' + id), (snapshot) => {
                    const data = snapshot.val();
                    const countElement = document.getElementById('count-' + id);
                    if(countElement) {
                        countElement.innerText = data ? Object.keys(data).length : 0;
                    }
                });
            });
        });

        // MOTEUR DE CHRONOMÈTRE INTELLIGENT (Tourne chaque seconde)
        setInterval(() => {
            const now = new Date().getTime();
            document.querySelectorAll('.match-timer').forEach(el => {
                if (el.dataset.live === "true") return; // Si déjà allumé, on ignore

                const matchTime = new Date(el.dataset.time).getTime();
                const diff = matchTime - now;
                
                if (diff > 0) {
                    const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                    const s = Math.floor((diff % (1000 * 60)) / 1000);
                    
                    const format = (num) => num < 10 ? '0' + num : num;
                    el.innerHTML = `⏳ ${format(h)}h ${format(m)}m ${format(s)}s`;
                } else {
                    // LE TEMPS EST ÉCOULÉ ! BASCULE AUTOMATIQUE EN MODE LIVE
                    el.dataset.live = "true";
                    el.className = "live-dot";
                    el.innerHTML = `<div class="dot"></div> LIVE`;
                    
                    const id = el.dataset.id;
                    const btn = document.getElementById('btn-' + id);
                    if(btn) {
                        btn.className = "btn-regarder";
                        btn.innerText = "REGARDER";
                        btn.disabled = false;
                        btn.onclick = () => window.location.href = 'player.html?id=' + id;
                    }
                    
                    const card = document.getElementById('card-' + id);
                    if(card) card.style.opacity = '1';
                }
            });
        }, 1000);

    </script>
</body>
</html>
